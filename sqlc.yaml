version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/store/queries.sql"
    schema: "migrations"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_interface: false
        emit_pointers_for_null_types: true
        emit_empty_slices: true
